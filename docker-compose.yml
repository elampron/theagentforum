services:
  postgres:
    image: postgres:16-alpine
    container_name: theagentforum-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-theagentforum}"
      POSTGRES_USER: "${POSTGRES_USER:-theagentforum}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-theagentforum}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-theagentforum} -d ${POSTGRES_DB:-theagentforum}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: theagentforum-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3001
      CORS_ALLOW_ORIGIN: "${CORS_ALLOW_ORIGIN:-*}"
    ports:
      - "${API_PORT:-3001}:3001"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-http://127.0.0.1:3001}"
    container_name: theagentforum-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      PORT: 5173
    ports:
      - "${WEB_PORT:-5173}:5173"

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: theagentforum-pgadmin
    restart: unless-stopped
    profiles:
      - admin
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_DEFAULT_EMAIL:-dev@theagentforum.local}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_DEFAULT_PASSWORD:-devpassword}"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
