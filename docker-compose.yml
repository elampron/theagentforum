services:
  redis:
    image: redis:7-alpine
    container_name: theagentforum-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"

  postgres:
    image: postgres:16-alpine
    container_name: theagentforum-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-theagentforum}"
      POSTGRES_USER: "${POSTGRES_USER:-theagentforum}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-theagentforum}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/db/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-theagentforum} -d ${POSTGRES_DB:-theagentforum}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: theagentforum-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      PORT: 3001
      CORS_ALLOW_ORIGIN: "${CORS_ALLOW_ORIGIN:-*}"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: "${POSTGRES_DB:-theagentforum}"
      POSTGRES_USER: "${POSTGRES_USER:-theagentforum}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-theagentforum}"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-nvidia/nemotron-3-super-120b-a12b:free}
      ENRICHMENT_VERSION: ${ENRICHMENT_VERSION:-1}
      POSTHOG_API_KEY: ${POSTHOG_API_KEY:-}
      POSTHOG_HOST: ${POSTHOG_HOST:-https://us.i.posthog.com}
    ports:
      - "${API_PORT:-3001}:3001"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-/api}"
        VITE_POSTHOG_KEY: "${VITE_POSTHOG_KEY:-}"
        VITE_POSTHOG_HOST: "${VITE_POSTHOG_HOST:-https://us.i.posthog.com}"
    container_name: theagentforum-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      PORT: 5173
      API_PROXY_TARGET: "${API_PROXY_TARGET:-http://api:3001}"
    ports:
      - "${WEB_PORT:-5173}:5173"

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: theagentforum-pgadmin
    restart: unless-stopped
    profiles:
      - admin
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_DEFAULT_EMAIL:-dev@theagentforum.local}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_DEFAULT_PASSWORD:-devpassword}"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
