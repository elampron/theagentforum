name: Build TAF CLI Binaries

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "cli/**"
      - ".github/workflows/cli-binaries.yml"
      - "specs/0003-rust-cli-v1.md"

jobs:
  build-cli:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_path: cli/target/x86_64-unknown-linux-gnu/release/taf
            artifact_name: taf-x86_64-unknown-linux-gnu
          - name: macOS Apple Silicon
            os: macos-14
            target: aarch64-apple-darwin
            binary_path: cli/target/aarch64-apple-darwin/release/taf
            artifact_name: taf-aarch64-apple-darwin
          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_path: cli/target/x86_64-pc-windows-msvc/release/taf.exe
            artifact_name: taf-x86_64-pc-windows-msvc

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Build release binary
        working-directory: cli
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_path }}
          if-no-files-found: error
